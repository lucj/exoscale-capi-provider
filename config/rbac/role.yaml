apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
  # Exoscale infrastructure resources
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [exoscaleclusters, exoscalemachines, exoscaleclustertemplates, exoscalemachinetemplates]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [exoscaleclusters/status, exoscalemachines/status]
    verbs: [get, update, patch]
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [exoscaleclusters/finalizers, exoscalemachines/finalizers]
    verbs: [update]
  # CAPI core resources (read-only)
  - apiGroups: [cluster.x-k8s.io]
    resources: [clusters, machines]
    verbs: [get, list, watch]
  # Bootstrap secret (cloud-init user-data)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # Events
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
