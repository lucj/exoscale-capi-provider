apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: my-cluster
  namespace: default
spec:
  clusterNetwork:
    pods:      { cidrBlocks: ["10.244.0.0/16"] }
    services:  { cidrBlocks: ["10.96.0.0/12"] }
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: ExoscaleCluster
    name: my-cluster
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: my-cluster-control-plane
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ExoscaleCluster
metadata:
  name: my-cluster
  namespace: default
spec:
  zone: ch-gva-2
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ExoscaleMachineTemplate
metadata:
  name: my-cluster-control-plane
  namespace: default
spec:
  template:
    spec:
      zone: ch-gva-2
      instanceType: standard.medium   # 2 vCPU / 4 GB — minimum for control plane
      template: "Linux Ubuntu 22.04 LTS 64-bit"
      diskSize: 50
      sshKey: SSH_KEY_ID
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: my-cluster-control-plane
  namespace: default
spec:
  replicas: 1
  version: v1.28.0
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: ExoscaleMachineTemplate
      name: my-cluster-control-plane
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs: { cloud-provider: external }
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs: { cloud-provider: external }
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ExoscaleMachineTemplate
metadata:
  name: my-cluster-workers
  namespace: default
spec:
  template:
    spec:
      zone: ch-gva-2
      instanceType: standard.medium
      template: "Linux Ubuntu 22.04 LTS 64-bit"
      diskSize: 50
      sshKey: SSH_KEY_ID
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: my-cluster-workers
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs: { cloud-provider: external }
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: my-cluster-workers
  namespace: default
spec:
  clusterName: my-cluster
  replicas: 2
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: my-cluster
  template:
    spec:
      clusterName: my-cluster
      version: v1.28.0
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: my-cluster-workers
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: ExoscaleMachineTemplate
        name: my-cluster-workers